<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persis İK - Lisans Üretici (Sadece Size Özel)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #1e293b;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            margin-top: 0;
            color: #38bdf8;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-image: linear-gradient(to right, #2563eb, #4f46e5);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .result-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #020617;
            border-left: 4px solid #10b981;
            border-radius: 4px;
            display: none;
        }

        .result-title {
            font-size: 0.8rem;
            color: #10b981;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .key {
            font-family: monospace;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-align: center;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🔑 Persis Lisans Anahtarı Üretici</h2>
        <p style="text-align: center; font-size: 0.8rem; color: #64748b; margin-bottom: 2rem;">
            DİKKAT: Bu dosyayı kimseyle paylaşmayın. Gelen VKN numaralarını buraya girip, çıkan şifreyi karşı tarafa
            gönderin.
        </p>

        <div class="form-group">
            <label for="vkn">Karşı Tarafın Verdiği VKN numarası:</label>
            <input type="text" id="vkn" placeholder="Örn: 12345678" autocomplete="off">
        </div>

        <button onclick="generate()">ŞİFRE ÜRET</button>

        <div class="result-box" id="resultBox">
            <div class="result-title">Bu Bilgisayarın Açılış Şifresi:</div>
            <div class="key" id="keyDisplay">XXXX-XXXX-XXXX-XXXX</div>
        </div>
    </div>

    <script>
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        async function generate() {
            const vkn = document.getElementById('vkn').value.trim();
            if (!vkn) return alert("Lütfen bir VKN giriniz.");

            // EXACT SAME SALT AND ALGORITHM AS persis-desktop/src/actions/license.ts
            const SECRET_SALT = "Ahmet-Persis-2026-XyZ-Professional-Edition";
            const hash = await sha256(`${vkn}-${SECRET_SALT}`);

            const shortHash = hash.substring(0, 16).toUpperCase();
            const finalKey = `${shortHash.slice(0, 4)}-${shortHash.slice(4, 8)}-${shortHash.slice(8, 12)}-${shortHash.slice(12, 16)}`;

            document.getElementById('keyDisplay').innerText = finalKey;
            document.getElementById('resultBox').style.display = 'block';
        }
    </script>
</body>

</html>
