<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persis IK</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #f8fafc;
            overflow: hidden;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2.5rem;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 900;
            color: white;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.5);
            margin-right: 18px;
            animation: pulse-glow 2s infinite ease-in-out;
        }

        .logo-text {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .loader {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border-top-color: #3b82f6;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin-bottom: 1.5rem;
        }

        .status-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-text {
            font-size: 1.1rem;
            color: #cbd5e1;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .sub-text {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 0.75rem;
            animation: breathe 3s infinite ease-in-out;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse-glow {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 0 12px rgba(59, 130, 246, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
            }
        }

        @keyframes breathe {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        .fade-in {
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="fade-in" style="display: flex; flex-direction: column; align-items: center;">
        <div class="logo-container">
            <svg viewBox="0 0 100 100" style="width: 150px; height: 150px; margin-bottom: 20px;" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="p-loop-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ff5555" />
                        <stop offset="40%" stop-color="#ee0000" />
                        <stop offset="100%" stop-color="#990000" />
                    </linearGradient>
                    <linearGradient id="p-stem-grad" x1="0%" y1="20%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#550000" />
                        <stop offset="40%" stop-color="#aa0000" />
                        <stop offset="100%" stop-color="#cc0000" />
                    </linearGradient>
                    <filter id="p-shadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="1" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.3" />
                    </filter>
                </defs>
                <g>
                    <path d="M 30 20 L 46 25 L 46 90 L 30 85 Z" fill="url(#p-stem-grad)" />
                    <path
                        d="M 30 20 L 60 29 C 85 35, 85 67, 60 73 L 30 64 L 30 48 L 60 57 C 68 55, 68 47, 60 45 L 30 36 Z"
                        fill="url(#p-loop-grad)" filter="url(#p-shadow)" stroke="url(#p-loop-grad)" stroke-width="1"
                        stroke-linejoin="round" />
                </g>
            </svg>
        </div>
        <div class="status-container">
            <div class="loader"></div>
            <div class="status-text">Masaüstü Başlatılıyor</div>
            <div class="sub-text">Lütfen bekleyin, modüller yükleniyor...</div>
        </div>
    </div>
</body>

</html>
