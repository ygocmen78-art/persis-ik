name: Persis IK - Build ve Yayinla

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Bagımlılıkları yükle
        run: npm ci

      - name: EXE Build et ve GitHub Release yayinla
        run: npm run app:publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
